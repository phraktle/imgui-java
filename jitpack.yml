# JitPack build configuration.
# https://jitpack.io/docs/BUILDING/
#
# We ship prebuilt native libs in bin/; no native compile on JitPack.
# Gradle 9.4.1 + JDK 21 is fine for publishToMavenLocal (generateApi
# has a known Kotlin 2.x ClassCastException under Gradle 9 but is not
# invoked during publishing).

jdk:
  - openjdk21

install:
  - ./gradlew :imgui-binding:publishToMavenLocal :imgui-lwjgl3:publishToMavenLocal :imgui-app:publishToMavenLocal -x test -x signImguiPublication -x javadoc --no-daemon
